<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extreme PDF Compressor (90% Reduction)</title>
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        .dropzone { border: 3px dashed #cbd5e1; padding: 40px; border-radius: 15px; cursor: pointer; margin-bottom: 20px; }
        .btn { background: #2563eb; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        .loader { display: none; margin-top: 20px; color: #2563eb; font-weight: bold; }
        #status { margin-top: 10px; font-size: 14px; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Extreme PDF Compressor</h2>
    <div class="dropzone" onclick="document.getElementById('fileInput').click()">
        Click to Upload PDF
        <input type="file" id="fileInput" hidden accept="application/pdf">
    </div>
    
    <div id="controls" style="display:none;">
        <p>Compression Level: <span id="qualLabel">50%</span></p>
        <input type="range" id="quality" min="5" max="90" value="50" style="width:100%" oninput="document.getElementById('qualLabel').innerText = this.value + '%'">
        <br><br>
        <button class="btn" onclick="startCompression()">Compress & Download</button>
    </div>

    <div id="loader" class="loader">
        <div id="progress">Processing... 0%</div>
        <p id="status">Converting pages to compressed images...</p>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let selectedFile = null;

    document.getElementById('fileInput').onchange = function(e) {
        selectedFile = e.target.files[0];
        if (selectedFile) {
            document.getElementById('controls').style.display = 'block';
        }
    };

    async function startCompression() {
        const quality = document.getElementById('quality').value / 100;
        const loader = document.getElementById('loader');
        const controls = document.getElementById('controls');
        
        loader.style.display = 'block';
        controls.style.display = 'none';

        const fileReader = new FileReader();
        fileReader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            const totalPages = pdf.numPages;
            const newPdf = new jsPDF();

            for (let i = 1; i <= totalPages; i++) {
                document.getElementById('progress').innerText = `Processing... ${Math.round((i/totalPages)*100)}%`;
                
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 }); // Image clarity vs size
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;

                // Yeh hai asli compression: Image quality kam karna
                const imgData = canvas.toDataURL('image/jpeg', quality);
                
                if (i > 1) newPdf.addPage();
                newPdf.addImage(imgData, 'JPEG', 0, 0, 210, 297); // A4 size
            }

            newPdf.save(`compressed_${Date.now()}.pdf`);
            loader.style.display = 'none';
            controls.style.display = 'block';
            alert("Done! Check your downloads.");
        };
        fileReader.readAsArrayBuffer(selectedFile);
    }
</script>

</body>
</html>
