<script type="text/javascript">
const basePath = window.location.origin;

fetch('/components/header.html')
  .then(res => {
    if (!res.ok) return fetch('../../components/header.html');
    return res.text();
  })
  .then(data => {
    document.getElementById('site-header').innerHTML = data;
  });

fetch('/components/footer.html')
  .then(res => {
    if (!res.ok) return fetch('../../components/footer.html');
    return res.text();
  })
  .then(data => {
    document.getElementById('site-footer').innerHTML = data;
  });

let currentExpressionString = "";
let savedCalculationLogList = [];
let isDegreeMode = true;
let isInverseMode = false;
let lastCalculatedAns = "0";

const displayMainNode = document.getElementById('calcMainDisplayConsole');
const displayHistoryNode = document.getElementById('calcHistoryConsole');
const drawerPanelNode = document.getElementById('historyDrawerPanel');

function updateDisplay() {
  displayMainNode.innerText = currentExpressionString || "0";
}

function triggerCalculatorAction(action, inputToken = "") {

  if (action !== 'history-toggle') {
    drawerPanelNode.style.display = 'none';
  }

  switch(action) {

    case 'digit':
      currentExpressionString += inputToken;
      break;

    case 'decimal':
      handleDecimal();
      break;

    case 'operator':
      handleOperator(inputToken);
      break;

    case 'bracket':
      currentExpressionString += inputToken;
      break;

    case 'constant':
      if (inputToken === 'pi') {
        currentExpressionString += "π";
      } else {
        currentExpressionString += "e";
      }
      break;

    case 'ans':
      currentExpressionString += lastCalculatedAns;
      break;

    case 'clear':
      currentExpressionString = "";
      displayHistoryNode.innerText = "";
      updateDisplay();
      return;

    case 'backspace':
      currentExpressionString = currentExpressionString.slice(0, -1);
      updateDisplay();
      return;

    case 'toggle-deg':
      isDegreeMode = true;
      document.getElementById('toggleDegBtn').classList.add('active-mode');
      document.getElementById('toggleRadBtn').classList.remove('active-mode');
      return;

    case 'toggle-rad':
      isDegreeMode = false;
      document.getElementById('toggleRadBtn').classList.add('active-mode');
      document.getElementById('toggleDegBtn').classList.remove('active-mode');
      return;

    case 'toggle-inv':
      toggleInverseMode();
      return;

    case 'sci-op':
      handleScientificOperation(inputToken);
      break;

    case 'history-toggle':
      toggleHistoryDrawer();
      return;

    case 'evaluate':
      evaluateExpression();
      return;
  }

  updateDisplay();
}

function handleDecimal() {
  const lastPart = currentExpressionString.split(/[\+\-\*\/\^\(\)%]/).pop();

  if (!lastPart.includes(".")) {
    currentExpressionString += ".";
  }
}

function handleOperator(operator) {

  const operators = ['+', '-', '*', '/', '^', '%'];

  const lastChar = currentExpressionString.slice(-1);

  if (currentExpressionString === "" && operator !== "-") return;

  if (operators.includes(lastChar)) {
    currentExpressionString =
      currentExpressionString.slice(0, -1) + operator;
  } else {
    currentExpressionString += operator;
  }
}

function toggleInverseMode() {

  isInverseMode = !isInverseMode;

  const invBtn = document.getElementById('toggleInvBtn');
  const sinBtn = document.getElementById('btn-sin');
  const cosBtn = document.getElementById('btn-cos');
  const tanBtn = document.getElementById('btn-tan');

  if (isInverseMode) {

    invBtn.classList.add('active-mode');

    sinBtn.innerHTML = "sin⁻¹";
    cosBtn.innerHTML = "cos⁻¹";
    tanBtn.innerHTML = "tan⁻¹";

  } else {

    invBtn.classList.remove('active-mode');

    sinBtn.innerHTML = "sin";
    cosBtn.innerHTML = "cos";
    tanBtn.innerHTML = "tan";
  }
}

function handleScientificOperation(operation) {

  if (operation === 'fact') {
    currentExpressionString += "!";
    return;
  }

  const opMap = {
    sin: isInverseMode ? "asin(" : "sin(",
    cos: isInverseMode ? "acos(" : "cos(",
    tan: isInverseMode ? "atan(" : "tan(",
    log: "log(",
    ln: "ln(",
    sqrt: "sqrt("
  };

  currentExpressionString += opMap[operation];
}

function toggleHistoryDrawer() {

  if (drawerPanelNode.style.display === 'block') {

    drawerPanelNode.style.display = 'none';

  } else {

    drawerPanelNode.style.display = 'block';
    renderHistoryLogView();
  }
}

function renderHistoryLogView() {

  drawerPanelNode.innerHTML = "";

  if (savedCalculationLogList.length === 0) {

    drawerPanelNode.innerHTML =
      "<div class='history-empty-msg'>No calculations yet</div>";

    return;
  }

  for (let i = savedCalculationLogList.length - 1; i >= 0; i--) {

    const item = document.createElement('div');

    item.className = "history-log-item";
    item.innerText = savedCalculationLogList[i];

    item.onclick = () => {

      currentExpressionString =
        savedCalculationLogList[i].split(" = ")[0];

      updateDisplay();

      drawerPanelNode.style.display = 'none';
    };

    drawerPanelNode.appendChild(item);
  }
}

function calculateFactorialBuffer(n) {

  n = Number(n);

  if (n < 0 || !Number.isInteger(n)) return NaN;

  if (n > 170) return Infinity;

  let result = 1;

  for (let i = 2; i <= n; i++) {
    result *= i;
  }

  return result;
}

function preprocessExpression(expression) {

  let exp = expression;

  exp = exp.replace(/π/g, Math.PI);
  exp = exp.replace(/\be\b/g, Math.E);

  exp = exp.replace(/÷/g, '/');
  exp = exp.replace(/×/g, '*');

  exp = exp.replace(/\^/g, '**');

  exp = exp.replace(/(\d+|\))\(/g, '$1*(');

  exp = exp.replace(/\)(\d+)/g, ')*$1');

  exp = exp.replace(/(\d+|\))(?=sin|cos|tan|asin|acos|atan|log|ln|sqrt)/g, '$1*');

  exp = exp.replace(/(\d+(\.\d+)?)%/g, '($1/100)');

  exp = exp.replace(/(\d+)!/g, 'calculateFactorialBuffer($1)');

  exp = exp.replace(/sqrt\(/g, 'Math.sqrt(');

  exp = exp.replace(/log\(/g, 'Math.log10(');

  exp = exp.replace(/ln\(/g, 'Math.log(');

  if (isDegreeMode) {

    exp = exp.replace(/sin\((.*?)\)/g,
      'Math.sin(($1)*Math.PI/180)');

    exp = exp.replace(/cos\((.*?)\)/g,
      'Math.cos(($1)*Math.PI/180)');

    exp = exp.replace(/tan\((.*?)\)/g,
      'Math.tan(($1)*Math.PI/180)');

    exp = exp.replace(/asin\((.*?)\)/g,
      '(Math.asin($1)*180/Math.PI)');

    exp = exp.replace(/acos\((.*?)\)/g,
      '(Math.acos($1)*180/Math.PI)');

    exp = exp.replace(/atan\((.*?)\)/g,
      '(Math.atan($1)*180/Math.PI)');

  } else {

    exp = exp.replace(/sin\((.*?)\)/g,
      'Math.sin($1)');

    exp = exp.replace(/cos\((.*?)\)/g,
      'Math.cos($1)');

    exp = exp.replace(/tan\((.*?)\)/g,
      'Math.tan($1)');

    exp = exp.replace(/asin\((.*?)\)/g,
      'Math.asin($1)');

    exp = exp.replace(/acos\((.*?)\)/g,
      'Math.acos($1)');

    exp = exp.replace(/atan\((.*?)\)/g,
      'Math.atan($1)');
  }

  return exp;
}

function evaluateExpression() {

  if (!currentExpressionString.trim()) return;

  try {

    displayHistoryNode.innerText =
      currentExpressionString + " =";

    let processedExpression =
      preprocessExpression(currentExpressionString);

    let result =
      Function('"use strict"; return (' + processedExpression + ')')();

    if (!isFinite(result) || isNaN(result)) {
      throw new Error("Invalid");
    }

    result = parseFloat(result.toFixed(12));

    if (Object.is(result, -0)) {
      result = 0;
    }

    displayMainNode.innerText = result;

    savedCalculationLogList.push(
      currentExpressionString + " = " + result
    );

    if (savedCalculationLogList.length > 50) {
      savedCalculationLogList.shift();
    }

    lastCalculatedAns = result.toString();

    currentExpressionString = result.toString();

  } catch (error) {

    displayMainNode.innerText = "Error";
  }
}

window.addEventListener('keydown', (event) => {

  const key = event.key;

  if (key >= '0' && key <= '9') {

    triggerCalculatorAction('digit', key);

  } else if (key === '.') {

    triggerCalculatorAction('decimal');

  } else if (
    ['+', '-', '*', '/', '%', '^'].includes(key)
  ) {

    triggerCalculatorAction('operator', key);

  } else if (key === '(' || key === ')') {

    triggerCalculatorAction('bracket', key);

  } else if (key === 'Enter' || key === '=') {

    event.preventDefault();

    triggerCalculatorAction('evaluate');

  } else if (key === 'Backspace') {

    triggerCalculatorAction('backspace');

  } else if (key === 'Escape') {

    triggerCalculatorAction('clear');
  }
});

document.addEventListener('click', (e) => {

  if (!e.target.closest('.calc-housing')) {
    drawerPanelNode.style.display = 'none';
  }
});
</script>
